<div class="admin-container">
  <div class="header">
    <h2>Admin Panel 🛡️</h2>
    <button (click)="logout()" class="btn-logout">Logout</button>
  </div>

  <div class="table-card">
    <h3>Leave Requests</h3>
    
    <table class="modern-table">
      <thead>
        <tr>
          <th>Student Name</th>
          <th>Reason</th>
          <th>From</th>
          <th>To</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let leave of leaves">
          <td>{{ leave.user?.name || 'N/A' }}</td> <!-- User name populate hoga -->
          <td>{{ leave.reason }}</td>
          <td>{{ leave.fromDate | date:'mediumDate' }}</td>
          <td>{{ leave.toDate | date:'mediumDate' }}</td>
          <td>
            <span class="status-badge" [ngClass]="{
              'pending': leave.status === 'Pending',
              'approved': leave.status === 'Approved',
              'rejected': leave.status === 'Rejected'
            }">{{ leave.status }}</span>
          </td>
          <td class="actions">
            <button *ngIf="leave.status === 'Pending'" (click)="updateStatus(leave._id, 'Approved')" class="btn-approve">Approve</button>
            <button *ngIf="leave.status === 'Pending'" (click)="updateStatus(leave._id, 'Rejected')" class="btn-reject">Reject</button>
          </td>
        </tr>
        <tr *ngIf="leaves.length === 0">
          <td colspan="6" style="text-align:center; padding: 20px;">No requests found.</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
