<div class="apply-container">
  <div class="apply-card">
    <h3>Create a Request</h3>
    
    <form (ngSubmit)="submitLeave()">
      
      <!-- Reason Select -->
      <div class="form-group">
        <label>Select Reason for Request</label>
        <select [(ngModel)]="reason" name="reason">
          <option value="Sick Leave">Sick Leave</option>
          <option value="Time Off">Time Off</option>
          <option value="Emergency">Emergency</option>
          <option value="Remote Work">Remote Work</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <!-- Priority Buttons -->
      <div class="form-group">
        <label>Priority</label>
        <div class="priority-group">
          <button type="button" (click)="priority='Low'" [ngClass]="{'active': priority==='Low'}">Low</button>
          <button type="button" (click)="priority='Medium'" [ngClass]="{'active': priority==='Medium'}">Medium</button>
          <button type="button" (click)="priority='High'" [ngClass]="{'active': priority==='High'}">High</button>
        </div>
      </div>

      <!-- Dates -->
      <div class="date-row">
        <div class="form-group">
          <label>From</label>
          <input type="date" [(ngModel)]="fromDate" name="fromDate">
        </div>
        <div class="form-group">
          <label>To</label>
          <input type="date" [(ngModel)]="toDate" name="toDate">
        </div>
      </div>

      <button type="submit" class="btn-submit">Submit</button>
    </form>
  </div>
</div>
